[agent]
    interval = "10s"
    round_interval = true
    metric_batch_size = 1000
    metric_buffer_limit = 10000
    collection_jitter = "0s"
    flush_interval = "10s"
    flush_jitter = "0s"
    precision = "1s"

# ===================================================================
# 1. INPUT: ดึงข้อมูลจาก MQTT Broker (VerneMQ)
# ===================================================================
[[inputs.mqtt_consumer]]
    servers = ["tcp://vernemq1.local:1883"] # ต่อไปยัง Container VerneMQ ในระบบ Network เดียวกัน
    topics = [
        "v1/+",
    ]
    qos = 1
    connection_timeout = "30s"

    client_id = "telegraf_mqtt_consumer"
    persistent_session = true

    # ระบุว่าข้อมูลที่เข้ามาเป็นรูปแบบ JSON
    data_format = "json_v2"

    [[inputs.mqtt_consumer.json_v2]]
        # ตั้งชื่อ Measurement ใน InfluxDB
        measurement_name = "environment_sensors"

        # ย้ายสลับขึ้นมาอยู่ตรงนี้ (ระดับบนสุดของ json_v2) เพื่อให้ Telegraf รู้จักฟิลด์เวลาหลัก
        timestamp_path = "payload.timestamp"
        timestamp_format = "unix"

        # 1. ดึงกลุ่ม Tags จาก Root หลัก
        [[inputs.mqtt_consumer.json_v2.object]]
            path = "@this"
            tags = ["id", "name", "place_id"]
            disable_prepend_keys = true

        # 2. ดึงกลุ่ม Fields และตั้งชื่อใหม่แบบคลีนๆ
        [[inputs.mqtt_consumer.json_v2.field]]
            path = "payload.temperature"
            rename = "temperature"
            type = "float"

        [[inputs.mqtt_consumer.json_v2.field]]
            path = "payload.humidity"
            rename = "humidity"
            type = "float"

        [[inputs.mqtt_consumer.json_v2.field]]
            path = "payload.pressure"
            rename = "pressure"
            type = "float"

# ===================================================================
# 2. OUTPUT: ส่งข้อมูลเข้า InfluxDB v2
# ===================================================================
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"] # ต่อไปยัง Container InfluxDB 
  token = "mytoken"               # อ้างอิงจาก docker-compose.yaml
  organization = "my-org"         # อ้างอิงจาก docker-compose.yaml
  bucket = "iot_data"             # อ้างอิงจาก docker-compose.yaml